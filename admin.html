<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจัดการคำถาม | SSO Quiz Game Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Password Lock Overlay -->
  <div id="password-overlay" class="password-overlay">
    <div class="glass-panel password-card">
      <h2 style="font-size: 1.6rem; margin-bottom: 15px; background: linear-gradient(135deg, #a78bfa 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        รหัสผ่านผู้ดูแลระบบ
      </h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px;">
        กรุณากรอกรหัสผ่านเพื่อเข้าใช้งานหน้านี้
      </p>
      <div id="pass-error" style="background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fc8181; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; display: none;">
        รหัสผ่านไม่ถูกต้อง!
      </div>
      <form onsubmit="checkPassword(event)">
        <div class="form-group">
          <input type="password" id="input-password" class="form-control" placeholder="ระบุรหัสผ่าน" required style="text-align: center; font-size: 1.2rem; letter-spacing: 2px;">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1rem; margin-top: 10px;">
          เข้าสู่ระบบ
        </button>
      </form>
    </div>
  </div>

  <header class="app-header">
    <div class="logo">SSO Quiz Game <span>Admin Panel</span></div>
    <div>
      <a href="host.html" class="btn btn-secondary">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        กลับหน้าหลักเกม
      </a>
    </div>
  </header>

  <main class="container">
    <div style="display: grid; grid-template-columns: 1fr; gap: 30px; margin-top: 20px;">
      
      <!-- Editor Form -->
      <section class="glass-panel" id="editor-section">
        <h2 id="form-title" style="margin-bottom: 20px; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; color: #a78bfa;">
          <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          เพิ่มคำถามใหม่
        </h2>
        
        <form id="question-form" onsubmit="saveQuestion(event)">
          <input type="hidden" id="edit-id" value="">
          
          <div class="form-group">
            <label for="q-text">คำถาม (Question)</label>
            <input type="text" id="q-text" class="form-control" placeholder="เช่น ผู้ประกันตนมาตรา 33 จะต้องมีนายจ้างหรือไม่?" required>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
              <label for="q-opt-0" style="color: var(--color-red); font-weight: bold;">ตัวเลือกสีแดง (A / Triangle)</label>
              <input type="text" id="q-opt-0" class="form-control" placeholder="ตัวเลือกข้อแรก" required>
            </div>
            <div class="form-group">
              <label for="q-opt-1" style="color: var(--color-blue); font-weight: bold;">ตัวเลือกสีน้ำเงิน (B / Diamond)</label>
              <input type="text" id="q-opt-1" class="form-control" placeholder="ตัวเลือกข้อสอง" required>
            </div>
            <div class="form-group">
              <label for="q-opt-2" style="color: var(--color-yellow); font-weight: bold;">ตัวเลือกสีเหลือง (C / Circle)</label>
              <input type="text" id="q-opt-2" class="form-control" placeholder="ตัวเลือกข้อสาม" required>
            </div>
            <div class="form-group">
              <label for="q-opt-3" style="color: var(--color-green); font-weight: bold;">ตัวเลือกสีเขียว (D / Square)</label>
              <input type="text" id="q-opt-3" class="form-control" placeholder="ตัวเลือกข้อสี่" required>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; align-items: end; margin-top: 10px;">
            <div class="form-group">
              <label>ข้อที่ถูกต้อง (Correct Answer)</label>
              <div class="radio-tile-group">
                <label class="radio-tile red">
                  <input type="radio" name="correct-idx" value="0" required checked>
                  <div class="icon">A</div>
                  <span class="tile-content" style="font-size: 0.85rem;">สีแดง</span>
                </label>
                <label class="radio-tile blue">
                  <input type="radio" name="correct-idx" value="1">
                  <div class="icon">B</div>
                  <span class="tile-content" style="font-size: 0.85rem;">สีน้ำเงิน</span>
                </label>
                <label class="radio-tile yellow">
                  <input type="radio" name="correct-idx" value="2">
                  <div class="icon">C</div>
                  <span class="tile-content" style="font-size: 0.85rem;">สีเหลือง</span>
                </label>
                <label class="radio-tile green">
                  <input type="radio" name="correct-idx" value="3">
                  <div class="icon">D</div>
                  <span class="tile-content" style="font-size: 0.85rem;">สีเขียว</span>
                </label>
              </div>
            </div>
            <div class="form-group">
              <label for="q-time">เวลาตอบ (วินาที)</label>
              <select id="q-time" class="form-control" style="background: rgba(0, 0, 0, 0.45); height: 50px;">
                <option value="10">10 วินาที</option>
                <option value="20" selected>20 วินาที</option>
                <option value="30">30 วินาที</option>
                <option value="60">60 วินาที</option>
              </select>
            </div>
          </div>

          <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
            <button type="button" id="cancel-btn" class="btn btn-secondary" onclick="resetForm()" style="display: none;">ยกเลิกแก้ไข</button>
            <button type="submit" class="btn btn-primary">
              <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
              บันทึกคำถาม
            </button>
          </div>
        </form>
      </section>

      <!-- Questions List -->
      <section class="glass-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 20px;">
          <h2 style="font-size: 1.5rem; color: #a78bfa; display: flex; align-items: center; gap: 10px;">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            รายการคำถามทั้งหมด (<span id="q-total-count">0</span> ข้อ)
          </h2>
          <div style="display: flex; gap: 10px;">
            <button class="btn btn-secondary" onclick="importBackup()" title="อัปโหลดคำถามจากไฟล์ JSON">
              นำเข้าคำถาม
            </button>
            <input type="file" id="import-file" style="display: none;" onchange="handleFileImport(event)" accept=".json">
            
            <button class="btn btn-secondary" onclick="exportBackup()" title="คัดลอกไฟล์คำถาม JSON สำหรับสำรองข้อมูล">
              สำรองคำถาม
            </button>
          </div>
        </div>

        <div style="overflow-x: auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th style="width: 50px;">ข้อที่</th>
                <th>คำถาม</th>
                <th>ตัวเลือก</th>
                <th style="width: 100px; text-align: center;">เวลาตอบ</th>
                <th style="width: 150px; text-align: right;">จัดการ</th>
              </tr>
            </thead>
            <tbody id="questions-list">
              <!-- Questions will insert here dynamically -->
              <tr>
                <td colspan="5" style="text-align: center; color: var(--text-muted);">กำลังโหลดข้อมูล...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
      
    </div>
  </main>

  <script>
    let questions = [];

    const defaultQuestions = [
      {
        "id": 1,
        "text": "ผู้ประกันตนมาตรา 33 (ม.33) หมายถึงกลุ่มบุคคลในข้อใด?",
        "options": [
          "พนักงานบริษัทเอกชนทั่วไปที่มีนายจ้าง",
          "ผู้ที่เคยเป็น ม.33 แล้วลาออกมาส่งเงินสมทบต่อเอง",
          "ผู้ประกอบอาชีพอิสระหรือฟรีแลนซ์",
          "ข้าราชการและพนักงานรัฐวิสาหกิจ"
        ],
        "answerIndex": 0,
        "timeLimit": 20
      },
      {
        "id": 2,
        "text": "สิทธิประโยชน์กรณีคลอดบุตร ผู้ประกันตนชาย (ม.33/ม.39) สามารถเบิกค่าคลอดบุตรของภรรยาได้ครั้งละกี่บาท?",
        "options": [
          "10,000 บาท",
          "12,000 บาท",
          "15,000 บาท",
          "20,000 บาท"
        ],
        "answerIndex": 2,
        "timeLimit": 20
      },
      {
        "id": 3,
        "text": "เงินสงเคราะห์บุตร ประกันสังคมจ่ายให้เดือนละกี่บาทต่อบุตร 1 คน (อายุไม่เกิน 6 ปีบริบูรณ์ จำกัดไม่เกิน 3 คน)?",
        "options": [
          "600 บาท",
          "800 บาท",
          "1,000 บาท",
          "1,200 บาท"
        ],
        "answerIndex": 1,
        "timeLimit": 20
      },
      {
        "id": 4,
        "text": "ผู้ประกันตนต้องส่งเงินสมทบอย่างน้อยกี่เดือน ภายใน 15 เดือนก่อนเดือนที่รับบริการทางการแพทย์ จึงจะได้รับสิทธิเจ็บป่วย?",
        "options": [
          "1 เดือน",
          "3 เดือน",
          "6 เดือน",
          "12 เดือน"
        ],
        "answerIndex": 1,
        "timeLimit": 20
      },
      {
        "id": 5,
        "text": "หากผู้ประกันตน ม.33 ลาออกจากงานเอง (ลาออกสมัครใจ) จะได้รับเงินชดเชยกรณีว่างงานในอัตราใด?",
        "options": [
          "30% ของค่าจ้างเฉลี่ย ไม่เกิน 90 วัน",
          "50% ของค่าจ้างเฉลี่ย ไม่เกิน 180 วัน",
          "45% ของค่าจ้างเฉลี่ย ไม่เกิน 90 วัน",
          "ไม่สามารถขอรับเงินชดเชยกรณีว่างงานได้"
        ],
        "answerIndex": 0,
        "timeLimit": 20
      },
      {
        "id": 6,
        "text": "หากผู้ประกันตน ม.33 ถูกเลิกจ้าง (ไม่ใช่ลาออกเอง) จะได้รับเงินชดเชยกรณีว่างงานในอัตราใด?",
        "options": [
          "30% ของค่าจ้างเฉลี่ย ไม่เกิน 90 วัน",
          "50% ของค่าจ้างเฉลี่ย ไม่เกิน 180 วัน",
          "70% ของค่าจ้างเฉลี่ย ไม่เกิน 200 วัน",
          "100% ของค่าจ้างเฉลี่ย ไม่เกิน 180 วัน"
        ],
        "answerIndex": 1,
        "timeLimit": 20
      },
      {
        "id": 7,
        "text": "การได้รับเงินบำนาญชราภาพ (จ่ายรายเดือนตลอดชีวิต) จะต้องจ่ายเงินสมทบครบกี่เดือนขึ้นไป และอายุเท่าใด?",
        "options": [
          "ครบ 120 เดือน และอายุ 50 ปีบริบูรณ์",
          "ครบ 150 เดือน และอายุ 55 ปีบริบูรณ์",
          "ครบ 180 เดือน และอายุ 55 ปีบริบูรณ์",
          "ครบ 200 เดือน และอายุ 60 ปีบริบูรณ์"
        ],
        "answerIndex": 2,
        "timeLimit": 20
      },
      {
        "id": 8,
        "text": "สิทธิเบิกค่าทำฟัน (ถอนฟัน อุดฟัน ขูดหินปูน) ปัจจุบันสามารถใช้สิทธิได้สูงสุดปีละกี่บาทโดยไม่ต้องสำรองจ่าย?",
        "options": [
          "600 บาทต่อปี",
          "900 บาทต่อปี",
          "1,200 บาทต่อปี",
          "1,500 บาทต่อปี"
        ],
        "answerIndex": 1,
        "timeLimit": 20
      },
      {
        "id": 9,
        "text": "ผู้ประกันตนมาตรา 39 (ม.39) คือใคร?",
        "options": [
          "ผู้ประกันตนสมัครใจ ที่เคยส่ง ม.33 มาไม่น้อยกว่า 12 เดือน และลาออกไม่เกิน 6 เดือน",
          "ผู้ประกอบอาชีพอิสระที่สมัครส่งเงินสมทบด้วยตนเองตั้งแต่ต้น",
          "ลูกจ้างในหน่วยงานราชการหรือวิสาหกิจ",
          "ผู้สูงอายุที่มีอายุตั้งแต่ 60 ปีขึ้นไป"
        ],
        "answerIndex": 0,
        "timeLimit": 20
      },
      {
        "id": 10,
        "text": "ผู้ประกันตนมาตรา 40 (ม.40) ทางเลือกที่ 3 (จ่าย 300 บาท/เดือน) จะได้รับเงินบำนาญชราภาพรายเดือนเมื่ออายุเท่าใด?",
        "options": [
          "อายุ 55 ปีบริบูรณ์",
          "อายุ 60 ปีบริบูรณ์",
          "อายุ 65 ปีบริบูรณ์",
          "ไม่ได้รับเงินบำนาญ (ได้รับเป็นเงินบำเหน็จก้อนเดียว)"
        ],
        "answerIndex": 1,
        "timeLimit": 20
      }
    ];

    window.onload = function() {
      if (sessionStorage.getItem('host_authenticated') === 'true') {
        document.getElementById('password-overlay').style.display = 'none';
        fetchQuestions();
      }
    };

    function checkPassword(e) {
      e.preventDefault();
      const pass = document.getElementById('input-password').value;
      if (pass === "ad2026") {
        sessionStorage.setItem('host_authenticated', 'true');
        document.getElementById('password-overlay').style.display = 'none';
        fetchQuestions();
      } else {
        document.getElementById('pass-error').style.display = 'block';
        document.getElementById('input-password').value = "";
      }
    }

    function fetchQuestions() {
      const stored = localStorage.getItem('sso_questions');
      if (stored) {
        try {
          questions = JSON.parse(stored);
        } catch (e) {
          questions = defaultQuestions;
          localStorage.setItem('sso_questions', JSON.stringify(questions));
        }
      } else {
        questions = defaultQuestions;
        localStorage.setItem('sso_questions', JSON.stringify(questions));
      }
      renderQuestions();
    }

    function renderQuestions() {
      const tbody = document.getElementById('questions-list');
      document.getElementById('q-total-count').textContent = questions.length;

      if (questions.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">ไม่มีคำถามในระบบ กรุณาเพิ่มคำถามใหม่</td></tr>`;
        return;
      }

      tbody.innerHTML = '';
      questions.forEach((q, idx) => {
        const tr = document.createElement('tr');
        
        // Format options summary
        const optionsList = q.options.map((opt, i) => {
          const badgeClass = i === q.answerIndex ? 'badge badge-green' : 'badge badge-secondary';
          const labels = ['A', 'B', 'C', 'D'];
          const colors = ['red', 'blue', 'yellow', 'green'];
          const styling = i === q.answerIndex ? `color: #34d399; font-weight: bold;` : `color: var(--text-muted);`;
          return `<div style="margin-bottom: 4px; font-size: 0.9rem; ${styling}">
            <span class="badge badge-${colors[i]}" style="margin-right: 6px;">${labels[i]}</span> ${escapeHtml(opt)}
          </div>`;
        }).join('');

        tr.innerHTML = `
          <td style="font-family: 'Outfit'; font-weight: bold; font-size: 1.2rem; vertical-align: top;">${idx + 1}</td>
          <td style="vertical-align: top; font-weight: 500; font-size: 1.1rem; line-height: 1.4;">${escapeHtml(q.text)}</td>
          <td>${optionsList}</td>
          <td style="text-align: center; vertical-align: top; font-family: 'Outfit'; font-weight: 600;">${q.timeLimit}s</td>
          <td style="text-align: right; vertical-align: top; white-space: nowrap;">
            <button class="btn btn-secondary" onclick="editQuestion(${idx})" style="padding: 6px 12px; font-size: 0.85rem; margin-right: 5px;">แก้ไข</button>
            <button class="btn btn-danger" onclick="deleteQuestion(${idx})" style="padding: 6px 12px; font-size: 0.85rem;">ลบ</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function saveQuestion(e) {
      e.preventDefault();
      
      const editIdStr = document.getElementById('edit-id').value;
      const text = document.getElementById('q-text').value.trim();
      const options = [
        document.getElementById('q-opt-0').value.trim(),
        document.getElementById('q-opt-1').value.trim(),
        document.getElementById('q-opt-2').value.trim(),
        document.getElementById('q-opt-3').value.trim(),
      ];
      
      const answerIndex = parseInt(document.querySelector('input[name="correct-idx"]:checked').value);
      const timeLimit = parseInt(document.getElementById('q-time').value);

      const qData = {
        id: editIdStr !== "" ? questions[parseInt(editIdStr)].id : Date.now(),
        text,
        options,
        answerIndex,
        timeLimit
      };

      if (editIdStr !== "") {
        // Edit mode
        questions[parseInt(editIdStr)] = qData;
      } else {
        // Add mode
        questions.push(qData);
      }

      saveToLocalStorage();
    }

    function saveToLocalStorage() {
      try {
        localStorage.setItem('sso_questions', JSON.stringify(questions));
        renderQuestions();
        resetForm();
        alert("บันทึกข้อมูลเรียบร้อยแล้ว");
      } catch (err) {
        console.error("Save error:", err);
        alert("เกิดข้อผิดพลาดในการบันทึกข้อมูลลงบราวเซอร์");
      }
    }

    function editQuestion(idx) {
      const q = questions[idx];
      document.getElementById('edit-id').value = idx;
      document.getElementById('q-text').value = q.text;
      document.getElementById('q-opt-0').value = q.options[0];
      document.getElementById('q-opt-1').value = q.options[1];
      document.getElementById('q-opt-2').value = q.options[2];
      document.getElementById('q-opt-3').value = q.options[3];
      
      document.querySelector(`input[name="correct-idx"][value="${q.answerIndex}"]`).checked = true;
      document.getElementById('q-time').value = q.timeLimit;

      document.getElementById('form-title').innerHTML = `
        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
        แก้ไขคำถามข้อที่ ${idx + 1}
      `;
      document.getElementById('cancel-btn').style.display = 'inline-flex';
      
      // Scroll to form
      document.getElementById('editor-section').scrollIntoView({ behavior: 'smooth' });
    }

    function deleteQuestion(idx) {
      if (confirm(`คุณต้องการลบคำถามข้อที่ ${idx + 1} ใช่หรือไม่?`)) {
        questions.splice(idx, 1);
        try {
          localStorage.setItem('sso_questions', JSON.stringify(questions));
          renderQuestions();
        } catch (e) {
          alert("ไม่สามารถลบคำถามได้");
        }
      }
    }

    function resetForm() {
      document.getElementById('edit-id').value = "";
      document.getElementById('question-form').reset();
      document.getElementById('form-title').innerHTML = `
        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        เพิ่มคำถามใหม่
      `;
      document.getElementById('cancel-btn').style.display = 'none';
      
      // Reset radio select
      document.querySelector('input[name="correct-idx"][value="0"]').checked = true;
      document.getElementById('q-time').value = "20";
    }

    function exportBackup() {
      const jsonStr = JSON.stringify(questions, null, 2);
      const textBlob = new Blob([jsonStr], { type: 'application/json; charset=utf-8' });
      const downloadLink = document.createElement('a');
      downloadLink.download = 'questions_backup.json';
      downloadLink.href = window.URL.createObjectURL(textBlob);
      downloadLink.style.display = 'none';
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    }

    function importBackup() {
      document.getElementById('import-file').click();
    }

    function handleFileImport(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          const imported = JSON.parse(evt.target.result);
          if (Array.isArray(imported)) {
            questions = imported;
            localStorage.setItem('sso_questions', JSON.stringify(questions));
            renderQuestions();
            alert("นำเข้าข้อมูลคำถามเรียบร้อยแล้ว!");
          } else {
            alert("รูปแบบไฟล์ไม่ถูกต้อง กรุณาอัปโหลดไฟล์ JSON สำรองคำถามที่ถูกต้อง");
          }
        } catch (err) {
          alert("ไม่สามารถอ่านไฟล์ได้ รูปแบบ JSON ไม่ถูกต้อง");
        }
      };
      reader.readAsText(file, 'UTF-8');
      // Reset file input value so it triggers onchange again next time
      e.target.value = "";
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
